# ============================================================
#  Area Goal Coordinates + Area 1 Move Config
#
#  Two or more named CONFIGS, each with its own area_1/2/3
#  nav goals AND area_1 relative move values.
#  Switch which one is active from the dashboard (FIELD CONFIG
#  buttons), or change `active_config` below to pick the default
#  used at launch.
#
#  x   : metres along the map X axis
#  y   : metres along the map Y axis
#  yaw : final heading in RADIANS (0 = East, 1.5708 = North)
#
#  area_1.move_x / move_y : /relative_move Vector3 x/y values
#  area_1.move_wait_sec   : seconds to wait before transitioning
#
#  area_2.retry_move_x/y  : /relative_move sent ONLY when the
#                           RETRY button is pressed for Area 2,
#                           before nav to the area_2 goal fires.
#  area_2.retry_move_wait_sec : seconds to hold that move.
# ============================================================

active_config: config_1

configs:
  config_1:
    area_1:
      move_x: -0.8 #six seven
      move_y:  0.4
      move_wait_sec: 1.0
    area_2:
      x: 1.54719
      y: -2.16271
      yaw: -0.00435559
      retry_move_x: 0.0   # tune me — metres forward on retry
      retry_move_y: 0.0   # tune me — metres lateral on retry
      retry_move_wait_sec: 2.0
    area_3:
      x: 9.764
      y: -3.31727
      yaw: -1.53451

  config_2:
    area_1:
      move_x: -0.8    # edit me
      move_y:  -0.0    # edit me
      move_wait_sec: 3.0
    area_2:
      x: 1.54719
      y: -2.16271
      yaw: -0.00435559
      retry_move_x: 0.0   # tune me — metres forward on retry
      retry_move_y: 0.0   # tune me — metres lateral on retry
      retry_move_wait_sec: 2.0
    area_3:
      x: 9.764
      y: -3.31727
      yaw: -1.53451